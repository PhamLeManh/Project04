{% extends "layout/base.html" %}

{% block content %}
<div class="container py-4">
    <h2 class="mb-4">
        <i class="fas fa-shopping-cart text-success"></i> 
        Giỏ hàng của bạn
    </h2>

    <div id="cart-container">
        <!-- Cart content will be loaded here -->
    </div>
</div>

<!-- Modal thanh toán -->
<div class="modal fade" id="checkoutModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">
                    <i class="fas fa-credit-card me-2"></i>Thanh toán đơn hàng
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="checkoutForm">
                    <!-- Thông tin người nhận -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Họ tên người nhận *</label>
                            <input type="text" class="form-control" id="receiver_name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số điện thoại *</label>
                            <input type="tel" class="form-control" id="receiver_phone" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Địa chỉ giao hàng *</label>
                        <textarea class="form-control" id="shipping_address" rows="2" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ghi chú đơn hàng</label>
                        <textarea class="form-control" id="order_note" rows="2" placeholder="Ghi chú về thời gian giao hàng, địa điểm cụ thể..."></textarea>
                    </div>

                    <!-- Phương thức thanh toán -->
                    <div class="mb-4">
                        <label class="form-label">Phương thức thanh toán *</label>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="payment_method" id="payment_cod" value="cod" checked>
                                    <label class="form-check-label" for="payment_cod">
                                        <i class="fas fa-money-bill me-2 text-success"></i>
                                        Thanh toán khi nhận hàng (COD)
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="payment_method" id="payment_bank" value="bank">
                                    <label class="form-check-label" for="payment_bank">
                                        <i class="fas fa-university me-2 text-primary"></i>
                                        Chuyển khoản ngân hàng
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Thông tin đơn hàng -->
                    <div class="card bg-light mb-3">
                        <div class="card-body">
                            <h6 class="card-title">Thông tin đơn hàng</h6>
                            <div id="order-summary">
                                <!-- Order items will be loaded here -->
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between">
                                <span class="fw-bold">Tổng cộng:</span>
                                <span class="fw-bold text-success fs-5" id="modal-total">0 VNĐ</span>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-success" onclick="processCheckout()">
                    <i class="fas fa-check-circle me-2"></i>Xác nhận đặt hàng
                </button>
            </div>
        </div>
    </div>
</div>

<script>
let cartData = null;

function loadCart() {
    fetch('/api/cart')
    .then(response => response.json())
    .then(data => {
        cartData = data;
        displayCart(data);
    })
    .catch(error => {
        console.error('Error loading cart:', error);
        document.getElementById('cart-container').innerHTML = `
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-circle me-2"></i>
                Không thể tải giỏ hàng. Vui lòng thử lại sau.
            </div>
        `;
    });
}

function displayCart(data) {
    const container = document.getElementById('cart-container');
    
    if (data.items && data.items.length > 0) {
        let itemsHtml = '';
        data.items.forEach(item => {
            itemsHtml += `
            <tr>
                <td>
                    <div class="d-flex align-items-center">
                        <img src="${item.image || 'https://via.placeholder.com/50'}" 
                             alt="${item.name}" 
                             style="width: 50px; height: 50px; object-fit: cover; border-radius: 5px;"
                             onerror="this.src='https://via.placeholder.com/50'">
                        <span class="ms-2 fw-bold">${item.name}</span>
                    </div>
                </td>
                <td class="text-success fw-bold">${formatCurrency(item.price)}</td>
                <td>
                    <div class="input-group" style="width: 130px;">
                        <button class="btn btn-outline-secondary btn-sm" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">
                            <i class="fas fa-minus"></i>
                        </button>
                        <input type="number" class="form-control form-control-sm text-center" 
                               value="${item.quantity}" min="1" 
                               onchange="updateQuantity(${item.id}, this.value)"
                               style="width: 50px;">
                        <button class="btn btn-outline-secondary btn-sm" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </td>
                <td class="fw-bold">${formatCurrency(item.subtotal)}</td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="removeItem(${item.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>
            `;
        });
        
        container.innerHTML = `
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-success">
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Đơn giá</th>
                            <th style="width: 150px;">Số lượng</th>
                            <th>Thành tiền</th>
                            <th style="width: 100px;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${itemsHtml}
                    </tbody>
                    <tfoot class="table-light">
                        <tr>
                            <td colspan="3" class="text-end"><strong>Tổng cộng:</strong></td>
                            <td colspan="2">
                                <strong class="text-success fs-5" id="cart-total">
                                    ${formatCurrency(data.total)}
                                </strong>
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>
            
            <div class="row mt-4">
                <div class="col-md-6">
                    <a href="/products-ui" class="btn btn-outline-success">
                        <i class="fas fa-arrow-left"></i> Tiếp tục mua sắm
                    </a>
                </div>
                <div class="col-md-6 text-end">
                    <button class="btn btn-success btn-lg" onclick="showCheckoutModal()" id="checkoutBtn">
                        <i class="fas fa-credit-card"></i> Tiến hành thanh toán
                    </button>
                </div>
            </div>
        `;
        
        updateCartCount(data.items.length);
    } else {
        container.innerHTML = `
            <div class="text-center py-5">
                <i class="fas fa-shopping-cart fa-4x text-muted mb-3"></i>
                <h4 class="text-muted">Giỏ hàng trống</h4>
                <p class="mb-4">Hãy thêm sản phẩm vào giỏ hàng</p>
                <a href="/products-ui" class="btn btn-success">
                    <i class="fas fa-shopping-basket"></i> Mua sắm ngay
                </a>
            </div>
        `;
        updateCartCount(0);
    }
}

function showCheckoutModal() {
    // Load order summary vào modal
    const summary = document.getElementById('order-summary');
    let itemsHtml = '<ul class="list-unstyled">';
    cartData.items.forEach(item => {
        itemsHtml += `
            <li class="d-flex justify-content-between mb-2">
                <span>${item.name} x ${item.quantity}</span>
                <span class="text-success">${formatCurrency(item.subtotal)}</span>
            </li>
        `;
    });
    itemsHtml += '</ul>';
    summary.innerHTML = itemsHtml;
    
    document.getElementById('modal-total').textContent = formatCurrency(cartData.total);
    
    // Load thông tin user từ localStorage nếu có
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (user.full_name) {
        document.getElementById('receiver_name').value = user.full_name;
    }
    if (user.phone) {
        document.getElementById('receiver_phone').value = user.phone;
    }
    if (user.address) {
        document.getElementById('shipping_address').value = user.address;
    }
    
    // Show modal
    new bootstrap.Modal(document.getElementById('checkoutModal')).show();
}

function processCheckout() {
    // Validate form
    const receiver_name = document.getElementById('receiver_name').value;
    const receiver_phone = document.getElementById('receiver_phone').value;
    const shipping_address = document.getElementById('shipping_address').value;
    
    if (!receiver_name || !receiver_phone || !shipping_address) {
        alert('Vui lòng điền đầy đủ thông tin người nhận');
        return;
    }
    
    // Disable nút để tránh submit nhiều lần
    const checkoutBtn = document.querySelector('.modal-footer .btn-success');
    checkoutBtn.disabled = true;
    checkoutBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Đang xử lý...';
    
    // Chuẩn bị dữ liệu đơn hàng
    const orderData = {
        receiver_name: receiver_name,
        receiver_phone: receiver_phone,
        shipping_address: shipping_address,
        order_note: document.getElementById('order_note').value,
        payment_method: document.querySelector('input[name="payment_method"]:checked').value,
        items: cartData.items,
        total: cartData.total
    };
    
    // Gửi đơn hàng
    fetch('/api/checkout', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(orderData)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            // Đóng modal
            bootstrap.Modal.getInstance(document.getElementById('checkoutModal')).hide();
            
            // Hiển thị thông báo thành công
            showNotification('Đặt hàng thành công! Mã đơn: #' + data.order_id, 'success');
            
            // Reload giỏ hàng (sẽ trống)
            setTimeout(() => {
                loadCart();
            }, 2000);
        } else {
            alert('Có lỗi xảy ra: ' + data.message);
        }
    })
    .catch(error => {
        console.error('Checkout error:', error);
        alert('Không thể kết nối đến server');
    })
    .finally(() => {
        checkoutBtn.disabled = false;
        checkoutBtn.innerHTML = '<i class="fas fa-check-circle me-2"></i>Xác nhận đặt hàng';
    });
}

function updateQuantity(productId, quantity) {
    if (quantity < 1) {
        if (confirm('Bạn có muốn xóa sản phẩm này?')) {
            removeItem(productId);
        }
        return;
    }
    
    fetch('/api/cart/update', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ product_id: productId, quantity: quantity })
    })
    .then(response => response.json())
    .then(data => {
        showNotification(data.message, 'success');
        loadCart();
    })
    .catch(error => {
        console.error('Error updating cart:', error);
        showNotification('Có lỗi xảy ra', 'error');
    });
}

function removeItem(productId) {
    fetch(`/api/cart/remove/${productId}`, {
        method: 'DELETE'
    })
    .then(response => response.json())
    .then(data => {
        showNotification(data.message, 'success');
        loadCart();
    })
    .catch(error => {
        console.error('Error removing item:', error);
        showNotification('Có lỗi xảy ra', 'error');
    });
}

function formatCurrency(amount) {
    return new Intl.NumberFormat('vi-VN', {
        style: 'currency',
        currency: 'VND'
    }).format(amount);
}

function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.className = `alert alert-${type} alert-dismissible fade show position-fixed top-0 end-0 m-3`;
    notification.style.zIndex = '9999';
    notification.style.minWidth = '300px';
    notification.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.remove();
    }, 3000);
}

function updateCartCount(count) {
    const badge = document.getElementById('cart-count');
    if (badge) {
        badge.textContent = count || 0;
    }
}

// Load cart khi trang load
document.addEventListener('DOMContentLoaded', loadCart);
</script>
{% endblock %}
