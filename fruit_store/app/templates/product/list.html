{% extends "layout/base.html" %}

{% block content %}
<div class="container py-4">
    <h2 class="mb-4">
        <i class="fas fa-apple-alt text-success"></i> 
        Danh sách trái cây tươi ngon
    </h2>

    <!-- Filter section -->
    <div class="row mb-4">
        <div class="col-md-3">
            <select class="form-select" id="categoryFilter">
                <option value="">Tất cả danh mục</option>
            </select>
        </div>
        <div class="col-md-3">
            <select class="form-select" id="sortFilter">
                <option value="default">Mặc định</option>
                <option value="price_asc">Giá tăng dần</option>
                <option value="price_desc">Giá giảm dần</option>
                <option value="name_asc">Tên A-Z</option>
            </select>
        </div>
        <div class="col-md-6">
            <div class="input-group">
                <input type="text" class="form-control" id="searchInput" placeholder="Tìm kiếm sản phẩm...">
                <button class="btn btn-success" type="button" onclick="searchProducts()">
                    <i class="fas fa-search"></i> Tìm
                </button>
            </div>
        </div>
    </div>

    <!-- Loading spinner -->
    <div id="loading" class="text-center py-5">
        <div class="spinner-border text-success" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">Đang tải sản phẩm...</p>
    </div>

    <!-- Products grid -->
    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4" id="products-container">
    </div>

    <!-- No products message -->
    <div id="no-products" class="text-center py-5" style="display: none;">
        <i class="fas fa-box-open fa-4x text-muted mb-3"></i>
        <h4 class="text-muted">Không tìm thấy sản phẩm</h4>
    </div>
</div>

<script>
let allProducts = [];
let categories = [];

async function fetchAPI(url) {
    try {
        console.log(`📡 Đang gọi API: ${url}`);
        const response = await fetch(url);
        console.log(`📥 Response status: ${response.status}`);
        
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        console.log(`📦 Dữ liệu:`, data);
        return data;
    } catch (error) {
        console.error('❌ Fetch error:', error);
        showNotification('Không thể kết nối đến server', 'error');
        return [];
    }
}

async function loadCategories() {
    const data = await fetchAPI('/api/categories');  // SỬA: thêm /api
    
    if (Array.isArray(data) && data.length > 0) {
        categories = data;
        const categorySelect = document.getElementById('categoryFilter');
        categorySelect.innerHTML = '<option value="">Tất cả danh mục</option>';
        
        data.forEach(cat => {
            categorySelect.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
        });
    }
}

async function loadProducts() {
    document.getElementById('loading').style.display = 'block';
    
    const data = await fetchAPI('/api/products');  // SỬA: thêm /api
    
    if (Array.isArray(data) && data.length > 0) {
        allProducts = data;
        displayProducts(data);
    } else {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('no-products').style.display = 'block';
    }
}

function displayProducts(products) {
    const container = document.getElementById('products-container');
    const loading = document.getElementById('loading');
    const noProducts = document.getElementById('no-products');
    
    loading.style.display = 'none';
    
    if (!products || products.length === 0) {
        noProducts.style.display = 'block';
        container.innerHTML = '';
        return;
    }
    
    noProducts.style.display = 'none';
    
    let html = '';
    products.forEach(product => {
        const category = categories.find(c => c.id == product.category_id);
        
        html += `
        <div class="col">
            <div class="card h-100">
                <img src="${product.image || 'https://images.unsplash.com/photo-1619566636858-adf3ef46400b'}" 
                     class="card-img-top" alt="${product.name}"
                     style="height: 200px; object-fit: cover;"
                     onerror="this.src='https://images.unsplash.com/photo-1619566636858-adf3ef46400b'">
                <div class="card-body">
                    <h5 class="card-title">${product.name}</h5>
                    <p class="card-text text-success fw-bold fs-5">${formatNumber(product.price)} VNĐ</p>
                    <p class="card-text text-muted small">
                        <i class="fas fa-box"></i> Còn: ${product.stock || 0} sản phẩm
                        ${category ? `<br><i class="fas fa-tag"></i> ${category.name}` : ''}
                    </p>
                    <button class="btn btn-success w-100" onclick="addToCart(${product.id})"
                            ${product.stock <= 0 ? 'disabled' : ''}>
                        <i class="fas fa-cart-plus"></i> 
                        ${product.stock > 0 ? 'Thêm vào giỏ' : 'Hết hàng'}
                    </button>
                </div>
            </div>
        </div>
        `;
    });
    
    container.innerHTML = html;
}

function formatNumber(num) {
    return new Intl.NumberFormat('vi-VN').format(num);
}

async function addToCart(productId) {
    const user = localStorage.getItem('user');
    if (!user) {
        if (confirm('Vui lòng đăng nhập để thêm vào giỏ hàng.')) {
            window.location.href = '/auth/login-page';
        }
        return;
    }
    
    try {
        const response = await fetch('/api/cart/add', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ product_id: productId })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            showNotification('✅ ' + data.message, 'success');
            if (window.updateCartCount) {
                window.updateCartCount();
            }
        } else {
            showNotification('❌ ' + data.message, 'error');
        }
    } catch (error) {
        showNotification('❌ Lỗi kết nối', 'error');
    }
}

function searchProducts() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const category = document.getElementById('categoryFilter').value;
    const sort = document.getElementById('sortFilter').value;
    
    let filtered = [...allProducts];
    
    if (searchTerm) {
        filtered = filtered.filter(p => 
            p.name.toLowerCase().includes(searchTerm) ||
            (p.description && p.description.toLowerCase().includes(searchTerm))
        );
    }
    
    if (category) {
        filtered = filtered.filter(p => p.category_id == category);
    }
    
    if (sort === 'price_asc') {
        filtered.sort((a, b) => a.price - b.price);
    } else if (sort === 'price_desc') {
        filtered.sort((a, b) => b.price - a.price);
    } else if (sort === 'name_asc') {
        filtered.sort((a, b) => a.name.localeCompare(b.name));
    }
    
    displayProducts(filtered);
}

function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.className = `alert alert-${type === 'success' ? 'success' : 'danger'} alert-dismissible fade show position-fixed top-0 end-0 m-3`;
    notification.style.zIndex = '9999';
    notification.style.minWidth = '300px';
    notification.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.remove();
    }, 3000);
}

document.getElementById('categoryFilter').addEventListener('change', searchProducts);
document.getElementById('sortFilter').addEventListener('change', searchProducts);
document.getElementById('searchInput').addEventListener('keyup', function(e) {
    if (e.key === 'Enter') {
        searchProducts();
    }
});

document.addEventListener('DOMContentLoaded', async function() {
    await loadCategories();
    await loadProducts();
});
</script>
{% endblock %}
