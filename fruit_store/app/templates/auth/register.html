<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - Fruit Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .register-header h2 {
            color: #333;
            font-weight: 600;
        }
        .register-header i {
            font-size: 60px;
            color: #28a745;
            margin-bottom: 20px;
        }
        .form-control {
            border-radius: 25px;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #28a745;
            box-shadow: none;
        }
        .btn-register {
            background: #28a745;
            color: white;
            border-radius: 25px;
            padding: 12px;
            font-weight: 600;
            border: none;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn-register:hover {
            background: #218838;
            transform: translateY(-2px);
        }
        .alert {
            border-radius: 25px;
            margin-top: 20px;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 16px;
        }
        .back-home:hover {
            color: #28a745;
        }
    </style>
</head>
<body>

<a href="/" class="back-home">
    <i class="fas fa-arrow-left"></i> Về trang chủ
</a>

<div class="register-card">
    <div class="register-header">
        <i class="fas fa-user-plus"></i>
        <h2>Đăng ký tài khoản</h2>
        <p class="text-muted">Tham gia cùng chúng tôi!</p>
    </div>

    <div id="error-message" class="alert alert-danger" style="display: none;"></div>
    <div id="success-message" class="alert alert-success" style="display: none;"></div>

    <form id="registerForm">
        <div class="mb-3">
            <label for="username" class="form-label">Tên đăng nhập</label>
            <input type="text" class="form-control" id="username" name="username" 
                   placeholder="Chọn tên đăng nhập" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" 
                   placeholder="Nhập email của bạn" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Mật khẩu</label>
            <input type="password" class="form-control" id="password" name="password" 
                   placeholder="Nhập mật khẩu" required>
        </div>
        <div class="mb-3">
            <label for="confirm_password" class="form-label">Xác nhận mật khẩu</label>
            <input type="password" class="form-control" id="confirm_password" 
                   placeholder="Nhập lại mật khẩu" required>
        </div>
        
        <button type="submit" class="btn-register" id="submitBtn">
            <span id="btnText">Đăng ký</span>
            <span id="btnSpinner" style="display: none;">
                <i class="fas fa-spinner fa-spin"></i> Đang xử lý...
            </span>
        </button>
    </form>

    <div class="login-link">
        <p>Đã có tài khoản? <a href="/auth/login-page" style="color: #28a745;">Đăng nhập</a></p>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    // Kiểm tra mật khẩu khớp
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    
    if (password !== confirmPassword) {
        document.getElementById('error-message').textContent = 'Mật khẩu xác nhận không khớp';
        document.getElementById('error-message').style.display = 'block';
        return;
    }
    
    // Reset messages
    document.getElementById('error-message').style.display = 'none';
    document.getElementById('success-message').style.display = 'none';
    
    // Show loading
    document.getElementById('btnText').style.display = 'none';
    document.getElementById('btnSpinner').style.display = 'inline';
    document.getElementById('submitBtn').disabled = true;
    
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    
    try {
        const response = await fetch('/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username, email, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            // Hiển thị success message
            document.getElementById('success-message').textContent = data.message;
            document.getElementById('success-message').style.display = 'block';
            
            // Redirect về trang login
            setTimeout(() => {
                window.location.href = '/auth/login-page';
            }, 2000);
        } else {
            // Hiển thị error message
            document.getElementById('error-message').textContent = data.message;
            document.getElementById('error-message').style.display = 'block';
            
            // Hide loading
            document.getElementById('btnText').style.display = 'inline';
            document.getElementById('btnSpinner').style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
        }
    } catch (error) {
        document.getElementById('error-message').textContent = 'Có lỗi xảy ra, vui lòng thử lại';
        document.getElementById('error-message').style.display = 'block';
        
        // Hide loading
        document.getElementById('btnText').style.display = 'inline';
        document.getElementById('btnSpinner').style.display = 'none';
        document.getElementById('submitBtn').disabled = false;
    }
});
</script>

</body>
</html>
